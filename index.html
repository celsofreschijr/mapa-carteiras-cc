<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa de Carteiras - Cuidados em Casa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
  :root {
    --bg: #f4f3ef;
    --panel: #ffffff;
    --border: #e0ddd4;
    --text: #1f1e1c;
    --text-muted: #6b6862;
    --accent: #1a3a2f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg); color: var(--text);
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    background: var(--accent); color: #fff;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    z-index: 1000;
  }
  header h1 { font-size: 16px; font-weight: 600; margin: 0; }
  header .meta { font-size: 12px; opacity: 0.85; }
  #menuBtn {
    display: none;
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    padding: 6px 10px; border-radius: 6px; font-size: 14px; cursor: pointer;
  }

  #main { flex: 1; display: flex; min-height: 0; }

  #sidebar {
    width: 280px; flex-shrink: 0;
    background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  #sidebar .section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  #sidebar .section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin: 0 0 10px 0; }

  #search {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 14px; background: var(--bg);
  }

  #sidebar input[type="text"] {
    width: 100%; padding: 7px 9px; border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; background: var(--bg); display: block;
  }

  .suggestion-card {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px;
    margin-bottom: 8px; background: var(--bg);
  }
  .suggestion-card.rank-1 { border-color: #1a3a2f; border-width: 2px; }
  .suggestion-card .s-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .suggestion-card .s-detail { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .suggestion-card .badge {
    display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px;
    background: #e67e22; color: #fff; margin-left: 6px;
  }
  .suggestion-card .badge.full { background: #c0392b; }

  .quickbtns { display: flex; gap: 6px; margin-bottom: 10px; }
  .quickbtns button {
    flex: 1; padding: 6px 8px; font-size: 12px; border: 1px solid var(--border);
    background: var(--bg); border-radius: 6px; cursor: pointer; color: var(--text);
  }
  .quickbtns button:hover { background: #e9e7de; }

  .nurse-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 4px;
    cursor: pointer; user-select: none; border-radius: 6px; font-size: 13px;
  }
  .nurse-row:hover { background: var(--bg); }
  .nurse-row input { accent-color: var(--accent); cursor: pointer; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .nurse-name { flex: 1; }
  .nurse-count { color: var(--text-muted); font-size: 12px; }

  #summary { font-size: 12px; color: var(--text-muted); padding: 10px 16px; border-top: 1px solid var(--border); margin-top: auto; }

  #mapContainer { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  .leaflet-popup-content { font-size: 13px; line-height: 1.5; }
  .leaflet-popup-content b { color: var(--accent); }

  /* Mobile */
  @media (max-width: 768px) {
    #menuBtn { display: inline-block; }
    #sidebar {
      position: fixed; top: 49px; left: 0; bottom: 0; width: 82vw; max-width: 300px;
      z-index: 999; transform: translateX(-100%);
      transition: transform 0.2s ease-out;
      box-shadow: 2px 0 12px rgba(0,0,0,0.2);
    }
    #sidebar.open { transform: translateX(0); }
    #overlay {
      display: none; position: fixed; top: 49px; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.35); z-index: 998;
    }
    #overlay.open { display: block; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Carteiras - Cuidados em Casa</h1>
      <div class="meta">Dados desidentificados (iniciais) - uso interno</div>
    </div>
    <button id="menuBtn" onclick="toggleSidebar()">Filtros</button>
  </header>

  <div id="main">
    <div id="overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
      <div class="section">
        <h2>Novo paciente - sugestão de enfermeira</h2>
        <input id="newName" type="text" placeholder="Nome do paciente" style="margin-bottom:6px;">
        <input id="newAddr" type="text" placeholder="Rua e número (ex: Rua Brasil, 1718)" style="margin-bottom:6px;">
        <input id="newBairro" type="text" placeholder="Bairro" style="margin-bottom:6px;">
        <input id="newCidade" type="text" placeholder="Cidade" value="Londrina" style="margin-bottom:6px;">
        <button id="suggestBtn" onclick="suggestNurse()" style="width:100%; padding:8px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px;">Buscar e sugerir</button>
        <div id="suggestStatus" style="font-size:12px; color:var(--text-muted); margin-top:6px;"></div>
        <div id="suggestResults" style="margin-top:10px;"></div>
      </div>
      <div class="section">
        <h2>Buscar paciente</h2>
        <input id="search" type="text" placeholder="Digite nome ou iniciais...">
      </div>
      <div class="section">
        <h2>Profissionais</h2>
        <div class="quickbtns">
          <button onclick="toggleAll(true)">Marcar todos</button>
          <button onclick="toggleAll(false)">Desmarcar todos</button>
        </div>
        <label style="display:flex; align-items:center; gap:6px; font-size:12px; margin:8px 0; cursor:pointer;">
          <input type="checkbox" id="territoryToggle" checked onchange="toggleTerritories(this.checked)">
          Mostrar perímetros de atendimento
        </label>
        <div id="nurseList"></div>
      </div>
      <div id="summary"></div>
    </div>

    <div id="mapContainer">
      <div id="map"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/d3-delaunay@6"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="data.js"></script>
<script>
const nurses = Object.keys(NURSE_COLORS).sort();
const active = new Set(nurses);
let searchTerm = '';

const map = L.map('map', { zoomControl: true }).setView([-23.31, -51.19], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

function makeDivIcon(color) {
  const svg =
    '<svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg" ' +
    'style="filter: drop-shadow(0 2px 3px rgba(0,0,0,0.45));">' +
    '<path d="M14 0C6.3 0 0 6.3 0 14c0 10.2 14 22 14 22s14-11.8 14-22C28 6.3 21.7 0 14 0z" ' +
    'fill="' + color + '" stroke="#ffffff" stroke-width="2.5"/>' +
    '<circle cx="14" cy="14" r="5.5" fill="#ffffff"/>' +
    '</svg>';
  return L.divIcon({
    className: '',
    html: svg,
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    popupAnchor: [0, -32]
  });
}

let clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 45,
  spiderfyOnMaxZoom: true,
  disableClusteringAtZoom: 16
});
map.addLayer(clusterGroup);

function evaluatePatientFit(pt) {
  const counts = currentCounts();
  const results = Object.keys(NURSE_HOMES).map(n => {
    const others = PATIENTS.filter(p => p.n === n && p.id !== pt.id);
    let avgDist;
    if (others.length > 0) {
      const total = others.reduce((sum, p) => sum + haversineKm(p.y, p.x, pt.y, pt.x), 0);
      avgDist = total / others.length;
    } else {
      const [hlat, hlon] = NURSE_HOMES[n];
      avgDist = haversineKm(hlat, hlon, pt.y, pt.x);
    }
    const count = counts[n] || 0;
    return { nurse: n, avgDist, count, vagas: NURSE_CAPACITY - count };
  });

  const current = results.find(r => r.nurse === pt.n);
  const alternatives = results
    .filter(r => r.nurse !== pt.n && r.vagas > 0)
    .sort((a, b) => a.avgDist - b.avgDist);

  const best = alternatives[0];
  const isUnfavorable = best && current && best.avgDist < current.avgDist * 0.75 && (current.avgDist - best.avgDist) > 0.5;

  return { current, best, secondBest: alternatives[1], isUnfavorable };
}

function buildPopupHtml(pt) {
  const options = Object.keys(NURSE_HOMES).sort()
    .filter(n => n !== pt.n)
    .map(n => '<option value="' + n + '">' + n + '</option>')
    .join('');

  const fit = evaluatePatientFit(pt);
  let suggestionHtml = '';
  if (fit.isUnfavorable) {
    suggestionHtml =
      '<div style="margin-top:8px; padding:8px; border:1px solid #e67e22; background:#fff8ef; border-radius:6px; font-size:12px;">' +
      '<b style="color:#c0631a;">⚠ Carteira desfavorável</b><br>' +
      'Distância média atual (' + pt.n + '): ' + fit.current.avgDist.toFixed(1) + ' km<br>' +
      'Melhor opção: <b>' + fit.best.nurse + '</b> (' + fit.best.avgDist.toFixed(1) + ' km, ' + fit.best.count + '/' + NURSE_CAPACITY + ')<br>' +
      '<button id="quickMoveBtn_' + pt.id + '" style="width:100%; margin-top:6px; padding:5px; font-size:12px; border:none; background:#e67e22; color:#fff; border-radius:6px; cursor:pointer;">' +
      'Mover para ' + fit.best.nurse + '</button>' +
      '</div>';
  }

  return '<div style="min-width:200px;">' +
    '<b>' + pt.p + '</b><br>' +
    'Profissional atual: ' + pt.n + '<br>' +
    suggestionHtml +
    '<select id="moveSel_' + pt.id + '" style="width:100%; margin-top:8px; padding:4px; font-size:12px;">' +
    '<option value="">Mudar para...</option>' + options + '</select>' +
    '<button id="moveBtn_' + pt.id + '" style="width:100%; margin-top:6px; padding:5px; font-size:12px; border:1px solid var(--accent); background:#fff; color:var(--accent); border-radius:6px; cursor:pointer;">Confirmar mudança</button>' +
    '<button id="delBtn_' + pt.id + '" style="width:100%; margin-top:6px; padding:5px; font-size:12px; border:1px solid #c0392b; background:#fff; color:#c0392b; border-radius:6px; cursor:pointer;">Excluir paciente</button>' +
    '</div>';
}

function attachPopupEvents(pt) {
  const moveBtn = document.getElementById('moveBtn_' + pt.id);
  const delBtn = document.getElementById('delBtn_' + pt.id);
  const quickBtn = document.getElementById('quickMoveBtn_' + pt.id);
  if (quickBtn) {
    const fit = evaluatePatientFit(pt);
    quickBtn.onclick = () => movePatientAction(pt, fit.best.nurse);
  }
  if (moveBtn) {
    moveBtn.onclick = () => {
      const sel = document.getElementById('moveSel_' + pt.id);
      const newNurse = sel.value;
      if (!newNurse) { alert('Selecione uma enfermeira antes de confirmar.'); return; }
      movePatientAction(pt, newNurse);
    };
  }
  if (delBtn) {
    delBtn.onclick = () => deletePatientAction(pt);
  }
}

async function movePatientAction(pt, newNurse) {
  if (!confirm('Mudar ' + pt.p + ' de ' + pt.n + ' para ' + newNurse + '?')) return;
  try {
    if (pt.source === 'added') {
      await db.collection('patients_added').doc(pt.id).update({ n: newNurse });
    } else {
      await db.collection('static_overrides').doc(pt.id).set({ action: 'move', newNurse }, { merge: true });
    }
    pt.n = newNurse;
    map.closePopup();
    buildNurseList();
    buildMarkers();
  } catch (err) {
    alert('Erro ao salvar a mudança. Verifique a configuração do Firebase.');
  }
}

async function deletePatientAction(pt) {
  if (!confirm('Excluir ' + pt.p + ' (carteira de ' + pt.n + ')? Essa ação não pode ser desfeita.')) return;
  try {
    if (pt.source === 'added') {
      await db.collection('patients_added').doc(pt.id).delete();
    } else {
      await db.collection('static_overrides').doc(pt.id).set({ action: 'delete' }, { merge: true });
    }
    const idx = PATIENTS.findIndex(p => p.id === pt.id);
    if (idx !== -1) PATIENTS.splice(idx, 1);
    map.closePopup();
    buildNurseList();
    buildMarkers();
  } catch (err) {
    alert('Erro ao excluir. Verifique a configuração do Firebase.');
  }
}

let territoryLayer = null;

function getTerritoryAnchors() {
  const EXCLUDED = ['Angela'];
  const OVERRIDE_ANCHOR = { 'Giovanna': [-23.2780418, -51.2810444] }; // Giovanna atende em Cambé
  const anchors = {};
  Object.keys(NURSE_HOMES).filter(n => !EXCLUDED.includes(n)).forEach(n => {
    anchors[n] = OVERRIDE_ANCHOR[n] || NURSE_HOMES[n];
  });
  return anchors;
}

function nearestPerimeterNurse(lat, lon) {
  const anchors = getTerritoryAnchors();
  let best = null, bestDist = Infinity;
  Object.keys(anchors).forEach(n => {
    const [alat, alon] = anchors[n];
    const d = haversineKm(alat, alon, lat, lon);
    if (d < bestDist) { bestDist = d; best = n; }
  });
  return best;
}

function buildTerritories() {
  const anchorsObj = getTerritoryAnchors();
  const nurses = Object.keys(anchorsObj);
  const anchors = nurses.map(n => anchorsObj[n]);

  // pontos no formato [lon, lat] exigido pelo d3-delaunay
  const points = anchors.map(([lat, lon]) => [lon, lat]);

  // bounding box cobrindo Londrina, Cambé, Ibiporã e Jataizinho
  const bbox = [-51.42, -23.42, -50.90, -23.14];

  const delaunay = d3.Delaunay.from(points);
  const voronoi = delaunay.voronoi(bbox);

  territoryLayer = L.layerGroup();

  nurses.forEach((n, i) => {
    const cell = voronoi.cellPolygon(i);
    if (!cell) return;
    const latlngs = cell.map(([lon, lat]) => [lat, lon]);
    const color = NURSE_COLORS[n];
    const poly = L.polygon(latlngs, {
      color: color, weight: 2, opacity: 0.75,
      fillColor: color, fillOpacity: 0.10
    });
    poly.bindTooltip(n, { permanent: false, direction: 'center', className: 'territory-label' });
    territoryLayer.addLayer(poly);

    // rótulo fixo no centro da região
    const [alat, alon] = anchorsObj[n];
    const labelIcon = L.divIcon({
      className: '',
      html: '<div style="font-size:11px; font-weight:700; color:' + color + '; text-shadow:0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff;">' + n + '</div>',
      iconSize: [0, 0]
    });
    territoryLayer.addLayer(L.marker([alat, alon], { icon: labelIcon, interactive: false }));

    // marca a casa/base da enfermeira
    const homeIcon = L.divIcon({
      className: '',
      html: '<div style="width:10px;height:10px;background:' + color + ';border:2px solid #fff;border-radius:2px;box-shadow:0 0 3px rgba(0,0,0,0.5);"></div>',
      iconSize: [10, 10], iconAnchor: [5, 5]
    });
    territoryLayer.addLayer(L.marker([alat, alon], { icon: homeIcon, interactive: false }));
  });

  territoryLayer.addTo(map);
}

function toggleTerritories(show) {
  if (!territoryLayer) return;
  if (show) { territoryLayer.addTo(map); } else { map.removeLayer(territoryLayer); }
}

function buildMarkers() {

  clusterGroup.clearLayers();
  const term = searchTerm.trim().toLowerCase();
  let shown = 0;
  const markers = [];
  for (const pt of PATIENTS) {
    if (!active.has(pt.n)) continue;
    if (term && !pt.p.toLowerCase().includes(term)) continue;
    const marker = L.marker([pt.y, pt.x], { icon: makeDivIcon(NURSE_COLORS[pt.n]) });
    marker.bindPopup(buildPopupHtml(pt));
    marker.on('popupopen', () => attachPopupEvents(pt));
    markers.push(marker);
    shown++;
  }
  clusterGroup.addLayers(markers);
  document.getElementById('summary').textContent = shown + ' pacientes exibidos de ' + PATIENTS.length + ' no total';
}

function buildNurseList() {
  const container = document.getElementById('nurseList');
  container.innerHTML = '';
  nurses.forEach(n => {
    const count = PATIENTS.filter(p => p.n === n).length;
    const row = document.createElement('label');
    row.className = 'nurse-row';
    row.innerHTML =
      '<input type="checkbox" checked data-nurse="' + n + '">' +
      '<span class="dot" style="background:' + NURSE_COLORS[n] + ';"></span>' +
      '<span class="nurse-name">' + n + '</span>' +
      '<span class="nurse-count">' + count + '</span>';
    container.appendChild(row);
  });
  container.addEventListener('change', (e) => {
    const n = e.target.getAttribute('data-nurse');
    if (!n) return;
    if (e.target.checked) active.add(n); else active.delete(n);
    buildMarkers();
  });
}

function toggleAll(state) {
  active.clear();
  if (state) nurses.forEach(n => active.add(n));
  document.querySelectorAll('#nurseList input[type=checkbox]').forEach(cb => cb.checked = state);
  buildMarkers();
}

document.getElementById('search').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  buildMarkers();
});

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function currentCounts() {
  const counts = {};
  Object.keys(NURSE_HOMES).forEach(n => counts[n] = 0);
  PATIENTS.forEach(p => { if (counts[p.n] !== undefined) counts[p.n]++; });
  return counts;
}

let previewMarker = null;
let lastSearch = null;

async function suggestNurse() {
  const name = document.getElementById('newName').value.trim();
  const addr = document.getElementById('newAddr').value.trim();
  const bairro = document.getElementById('newBairro').value.trim();
  const cidade = document.getElementById('newCidade').value.trim() || 'Londrina';
  const statusEl = document.getElementById('suggestStatus');
  const resultsEl = document.getElementById('suggestResults');
  resultsEl.innerHTML = '';

  if (!name) {
    statusEl.textContent = 'Digite o nome do paciente.';
    statusEl.style.color = '#c0392b';
    return;
  }
  if (!addr) {
    statusEl.textContent = 'Digite ao menos a rua e o número.';
    statusEl.style.color = '#c0392b';
    return;
  }

  const query = [addr, bairro, cidade, 'Parana', 'Brasil'].filter(Boolean).join(', ');
  statusEl.style.color = 'var(--text-muted)';
  statusEl.textContent = 'Buscando endereço...';

  try {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=' + encodeURIComponent(query);
    const resp = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
    const data = await resp.json();

    if (!data || data.length === 0) {
      statusEl.textContent = 'Endereço não encontrado. Tente com mais detalhes (bairro, cidade).';
      statusEl.style.color = '#c0392b';
      return;
    }

    const lat = parseFloat(data[0].lat);
    const lon = parseFloat(data[0].lon);
    lastSearch = { name, addr, bairro, cidade, lat, lon };
    statusEl.style.color = 'var(--text-muted)';
    statusEl.textContent = 'Endereço localizado: ' + data[0].display_name;

    if (previewMarker) map.removeLayer(previewMarker);
    const previewSvg =
      '<svg width="32" height="41" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg" ' +
      'style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.55));">' +
      '<path d="M14 0C6.3 0 0 6.3 0 14c0 10.2 14 22 14 22s14-11.8 14-22C28 6.3 21.7 0 14 0z" ' +
      'fill="#111111" stroke="#ffffff" stroke-width="3"/>' +
      '<circle cx="14" cy="14" r="6" fill="#ffd23f"/>' +
      '</svg>';
    previewMarker = L.marker([lat, lon], {
      icon: L.divIcon({
        className: '',
        html: previewSvg,
        iconSize: [32, 41], iconAnchor: [16, 41], popupAnchor: [0, -36]
      })
    }).addTo(map).bindPopup('Novo paciente (proposto)').openPopup();
    map.setView([lat, lon], 14);

    const counts = currentCounts();
    const ranked = Object.keys(NURSE_HOMES).map(n => {
      const [hlat, hlon] = NURSE_HOMES[n];
      const homeDist = haversineKm(hlat, hlon, lat, lon);
      const nursePatients = PATIENTS.filter(p => p.n === n);
      const count = nursePatients.length;
      let avgDist = homeDist;
      if (count > 0) {
        const total = nursePatients.reduce((sum, p) => sum + haversineKm(p.y, p.x, lat, lon), 0);
        avgDist = total / count;
      }
      return { nurse: n, homeDist, avgDist, count, vagas: NURSE_CAPACITY - count };
    });

    // Exclude nurses at full capacity from top ranking, but keep visible if needed
    ranked.sort((a, b) => {
      const aFull = a.vagas <= 0 ? 1 : 0;
      const bFull = b.vagas <= 0 ? 1 : 0;
      if (aFull !== bFull) return aFull - bFull;
      return a.avgDist - b.avgDist;
    });

    const top3 = ranked.slice(0, 3);
    const perimeterOwner = nearestPerimeterNurse(lat, lon);
    resultsEl.innerHTML = '<div style="font-size:12px; font-weight:600; margin-bottom:6px;">Sugestões (ordenado por proximidade média à carteira atual, respeitando limite de 100):</div>';
    top3.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'suggestion-card' + (i === 0 ? ' rank-1' : '');
      const badge = r.vagas <= 0
        ? '<span class="badge full">CARTEIRA CHEIA</span>'
        : (r.vagas <= 10 ? '<span class="badge">' + r.vagas + ' vagas</span>' : '');
      const perimeterWarning = (r.nurse !== perimeterOwner)
        ? '<div style="margin-top:6px; padding:6px; border:1px solid #e67e22; background:#fff8ef; border-radius:5px; font-size:11px; color:#a5560f;">⚠ Fora do perímetro histórico de ' + r.nurse + ' (mais próximo do perímetro de ' + perimeterOwner + ')</div>'
        : '';
      card.innerHTML =
        '<div class="s-title"><span class="dot" style="background:' + NURSE_COLORS[r.nurse] + ';"></span>' +
        (i + 1) + 'º - ' + r.nurse + badge + '</div>' +
        '<div class="s-detail">Distância média até os pacientes dela: ' + r.avgDist.toFixed(1) + ' km</div>' +
        '<div class="s-detail">Distância até o ponto de partida dela: ' + r.homeDist.toFixed(1) + ' km</div>' +
        '<div class="s-detail">Carteira atual: ' + r.count + ' / ' + NURSE_CAPACITY + ' pacientes</div>' +
        perimeterWarning;
      if (r.vagas > 0) {
        const btn = document.createElement('button');
        btn.textContent = 'Adicionar à carteira de ' + r.nurse;
        btn.style.cssText = 'width:100%; margin-top:8px; padding:6px; font-size:12px; border:1px solid var(--accent); background:#fff; color:var(--accent); border-radius:6px; cursor:pointer;';
        btn.onclick = () => addToCarteira(r.nurse, btn);
        card.appendChild(btn);
      }
      resultsEl.appendChild(card);
    });

  } catch (err) {
    statusEl.textContent = 'Erro ao buscar endereço. Tente novamente em alguns segundos.';
    statusEl.style.color = '#c0392b';
  }
}

function initials(name) {
  const words = name.trim().split(/\s+/);
  if (words.length === 1) return words[0][0] + '.';
  return words[0] + ' ' + words[words.length - 1][0] + '.';
}

async function addToCarteira(nurse, btnEl) {
  if (!lastSearch) return;
  const confirmMsg = 'Confirmar adição de "' + lastSearch.name + '" à carteira de ' + nurse + '?';
  if (!confirm(confirmMsg)) return;

  btnEl.disabled = true;
  btnEl.textContent = 'Salvando...';

  const record = {
    n: nurse,
    p: initials(lastSearch.name),
    x: lastSearch.lon,
    y: lastSearch.lat,
    addr: lastSearch.addr,
    bairro: lastSearch.bairro,
    cidade: lastSearch.cidade,
    ts: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    const docRef = await db.collection('patients_added').add(record);
    PATIENTS.push({ n: nurse, p: record.p, x: record.x, y: record.y, id: docRef.id, source: 'added' });
    buildNurseList();
    buildMarkers();
    btnEl.textContent = 'Adicionado ✓';
    document.getElementById('suggestStatus').textContent = 'Paciente registrado na carteira de ' + nurse + '.';
    document.getElementById('suggestStatus').style.color = '#1a7a3d';
  } catch (err) {
    btnEl.disabled = false;
    btnEl.textContent = 'Adicionar à carteira de ' + nurse;
    document.getElementById('suggestStatus').textContent = 'Erro ao salvar. Verifique a configuração do Firebase.';
    document.getElementById('suggestStatus').style.color = '#c0392b';
  }
}

async function loadAddedPatients() {
  // Marca os pacientes estáticos (vindos do data.js) com sua origem
  PATIENTS.forEach(p => { p.source = 'static'; });

  try {
    const snap = await db.collection('patients_added').get();
    snap.forEach(doc => {
      const d = doc.data();
      PATIENTS.push({ n: d.n, p: d.p, x: d.x, y: d.y, id: doc.id, source: 'added' });
    });
  } catch (err) {
    console.warn('Não foi possível carregar pacientes adicionados (Firebase ainda não configurado?)', err);
    return;
  }

  try {
    const overridesSnap = await db.collection('static_overrides').get();
    const toDelete = new Set();
    overridesSnap.forEach(doc => {
      const d = doc.data();
      const target = PATIENTS.find(p => p.id === doc.id && p.source === 'static');
      if (!target) return;
      if (d.action === 'delete') {
        toDelete.add(doc.id);
      } else if (d.action === 'move' && d.newNurse) {
        target.n = d.newNurse;
      }
    });
    if (toDelete.size > 0) {
      for (let i = PATIENTS.length - 1; i >= 0; i--) {
        if (toDelete.has(PATIENTS[i].id)) PATIENTS.splice(i, 1);
      }
    }
  } catch (err) {
    console.warn('Não foi possível carregar pacientes adicionados (Firebase ainda não configurado?)', err);
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

async function init() {
  await loadAddedPatients();
  buildNurseList();
  buildMarkers();
  buildTerritories();
}
init();
</script>
